<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダイエット進捗管理</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: white;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(66,153,225,0.4);
    }

    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* --- Summary Cards --- */
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 600px) {
      .cards { grid-template-columns: repeat(4, 1fr); }
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-label {
      font-size: 0.72rem;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .card-unit { font-size: 0.8rem; color: #718096; }

    .card.goal-weight    .card-value { color: #805ad5; }
    .card.current-weight .card-value { color: #3182ce; }
    .card.plan-orig      .card-value { color: #38a169; }
    .card.plan-revised   .card-value { color: #e67e22; }

    /* --- Progress Bar --- */
    .section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .section h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 14px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 8px;
    }

    .progress-bar-track {
      background: #e2e8f0;
      border-radius: 9999px;
      height: 18px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #4299e1, #3182ce);
      transition: width 0.6s ease;
      min-width: 2px;
    }

    .progress-sub {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 6px;
    }

    /* --- Charts --- */
    .chart-wrap {
      position: relative;
      width: 100%;
    }

    /* --- Table --- */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }

    thead th {
      background: #f7fafc;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
      color: #4a5568;
      border-bottom: 2px solid #e2e8f0;
      white-space: nowrap;
    }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #edf2f7;
      white-space: nowrap;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f7fafc; }

    .deficit-positive { color: #3182ce; font-weight: 600; }
    .deficit-negative { color: #e53e3e; font-weight: 600; }

    .no-data {
      text-align: center;
      padding: 40px;
      color: #a0aec0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>ダイエット進捗管理</h1>
  <p>2025年3月25日〜4月30日｜目標: -2kg（-14,000kcal）</p>
</header>

<main>

  <!-- Summary Cards -->
  <div class="cards">
    <div class="card goal-weight">
      <span class="card-label">目標体重</span>
      <span class="card-value" id="val-goal-weight">65.0</span>
      <span class="card-unit">kg</span>
    </div>
    <div class="card current-weight">
      <span class="card-label">直近体重 / 減量</span>
      <span class="card-value" id="val-current-weight">--</span>
      <span class="card-unit">kg / <span id="val-lost">--</span> kg減</span>
    </div>
    <div class="card plan-orig">
      <span class="card-label">当初計画赤字/日</span>
      <span class="card-value" id="val-plan-orig">--</span>
      <span class="card-unit">kcal/日</span>
    </div>
    <div class="card plan-revised">
      <span class="card-label">修正計画赤字/日</span>
      <span class="card-value" id="val-plan-revised">--</span>
      <span class="card-unit">kcal/日</span>
    </div>
  </div>

  <!-- Progress Bar -->
  <div class="section">
    <h2>累積カロリー赤字 進捗</h2>
    <div class="progress-meta">
      <span id="prog-label">0 / 17,500 kcal</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-sub">
      <span id="prog-days">記録: 0日</span>
      <span id="prog-remain">残り: 17,500 kcal</span>
    </div>
  </div>

  <!-- Weight Chart -->
  <div class="section">
    <h2>体重推移</h2>
    <div class="chart-wrap">
      <canvas id="weightChart" height="120"></canvas>
    </div>
  </div>

  <!-- Deficit Chart -->
  <div class="section">
    <h2>日別カロリー赤字</h2>
    <div class="chart-wrap">
      <canvas id="deficitChart" height="120"></canvas>
    </div>
  </div>

  <!-- Log Table -->
  <div class="section">
    <h2>日別ログ一覧</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日付</th>
            <th>体重 (kg)</th>
            <th>摂取 (kcal)</th>
            <th>消費 (kcal)</th>
            <th>赤字 (kcal)</th>
            <th>運動</th>
            <th>メモ</th>
          </tr>
        </thead>
        <tbody id="log-tbody">
          <tr><td colspan="7" class="no-data">データを読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script>
  const GOAL_KCAL = 17500;
  const BASE_BURN = 2400;
  const START_WEIGHT = 69.5;
  const TARGET_WEIGHT = 65.0;
  const START_DATE = '2025-03-25';
  const END_DATE = '2025-04-30';
  const TOTAL_DAYS = 37;

  // ★ ここにデータを直接埋め込む（毎日Claude Codeが追記）
  const LOG_DATA = {
    "entries": [
      {
        "date": "2025-03-27",
        "weight": 69.4,
        "intake": 1900,
        "exercise": [
          {"name": "ウォーキング30分", "kcal": 0}
        ],
        "burn": 2400,
        "deficit": 500,
        "memo": ""
      },
      {
        "date": "2025-03-26",
        "weight": 69.4,
        "intake": 1900,
        "exercise": [
          {"name": "筋トレ", "kcal": 0}
        ],
        "burn": 2400,
        "deficit": 500,
        "memo": ""
      },
      {
        "date": "2025-03-25",
        "weight": 69.5,
        "intake": 1900,
        "exercise": [],
        "burn": 2200,
        "deficit": 300,
        "memo": ""
      }
    ]
  };

  let weightChart, deficitChart;

  function loadData() {
    return LOG_DATA.entries || [];
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function renderCards(entries) {
    if (!entries.length) return;
    const last = [...entries].sort((a, b) => a.date > b.date ? -1 : 1)[0];

    // 直近体重・減量体重
    const currentWeight = last.weight ?? '--';
    const lost = last.weight != null ? Math.max(0, START_WEIGHT - last.weight).toFixed(1) : '--';
    document.getElementById('val-current-weight').textContent = currentWeight;
    document.getElementById('val-lost').textContent = lost;

    // 当初計画赤字/日
    const planOrig = Math.round(GOAL_KCAL / TOTAL_DAYS);
    document.getElementById('val-plan-orig').textContent = planOrig.toLocaleString();

    // 修正計画赤字/日（残り目標赤字 ÷ 残り日数）
    const totalDeficit = entries.reduce((sum, e) => sum + (e.deficit ?? (e.burn - e.intake)), 0);
    const today = new Date();
    const endDate = new Date(END_DATE + 'T00:00:00');
    const remainDays = Math.max(1, Math.ceil((endDate - today) / (1000 * 60 * 60 * 24)));
    const remainKcal = Math.max(0, GOAL_KCAL - totalDeficit);
    const planRevised = Math.round(remainKcal / remainDays);
    document.getElementById('val-plan-revised').textContent = planRevised.toLocaleString();
  }

  function renderProgress(entries) {
    const totalDeficit = entries.reduce((sum, e) => {
      const d = e.deficit ?? (e.burn - e.intake);
      return sum + (d || 0);
    }, 0);
    const pct = Math.min(100, Math.round(totalDeficit / GOAL_KCAL * 100));
    const remain = Math.max(0, GOAL_KCAL - totalDeficit);

    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-pct').textContent = pct + '%';
    document.getElementById('prog-label').textContent =
      `${totalDeficit.toLocaleString()} / ${GOAL_KCAL.toLocaleString()} kcal`;
    document.getElementById('prog-days').textContent = `記録: ${entries.length}日`;
    document.getElementById('prog-remain').textContent =
      `残り: ${remain.toLocaleString()} kcal`;
  }

  function renderWeightChart(entries) {
    const ctx = document.getElementById('weightChart').getContext('2d');
    const labels = entries.map(e => formatDate(e.date));
    const weights = entries.map(e => e.weight);

    if (weightChart) weightChart.destroy();
    weightChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: '体重 (kg)',
          data: weights,
          borderColor: '#805ad5',
          backgroundColor: 'rgba(128,90,213,0.1)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#805ad5',
          tension: 0.3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.parsed.y} kg`
            }
          }
        },
        scales: {
          y: {
            min: 65.0,
            ticks: { callback: v => v + ' kg' },
            grid: { color: '#edf2f7' }
          },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderDeficitChart(entries) {
    const ctx = document.getElementById('deficitChart').getContext('2d');
    const labels = entries.map(e => formatDate(e.date));
    const deficits = entries.map(e => e.deficit ?? (e.burn - e.intake));
    const colors = deficits.map(d => d >= 0 ? 'rgba(66,153,225,0.8)' : 'rgba(229,62,62,0.8)');
    const cumulative = deficits.reduce((acc, d) => {
      acc.push((acc.length ? acc[acc.length - 1] : 0) + d);
      return acc;
    }, []);

    if (deficitChart) deficitChart.destroy();
    deficitChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            label: '日別赤字 (kcal)',
            data: deficits,
            backgroundColor: colors,
            borderRadius: 4,
            yAxisID: 'y',
          },
          {
            label: '累計赤字 (kcal)',
            data: cumulative,
            type: 'line',
            borderColor: '#e67e22',
            backgroundColor: 'rgba(230,126,34,0.1)',
            borderWidth: 2,
            pointRadius: 3,
            pointBackgroundColor: '#e67e22',
            tension: 0.3,
            fill: false,
            yAxisID: 'y2',
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: true, position: 'top' },
          tooltip: {
            callbacks: {
              label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} kcal`
            }
          }
        },
        scales: {
          y: {
            position: 'left',
            ticks: { callback: v => v.toLocaleString() },
            grid: { color: '#edf2f7' }
          },
          y2: {
            position: 'right',
            ticks: { callback: v => v.toLocaleString() },
            grid: { drawOnChartArea: false }
          },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderTable(entries) {
    const tbody = document.getElementById('log-tbody');
    if (!entries.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="no-data">記録がありません</td></tr>';
      return;
    }

    const rows = [...entries].reverse().map(e => {
      const deficit = e.deficit ?? (e.burn - e.intake);
      const defClass = deficit >= 0 ? 'deficit-positive' : 'deficit-negative';
      const exercise = (e.exercise || []).map(ex => `${ex.name}(${ex.kcal}kcal)`).join('、') || '-';
      return `<tr>
        <td>${e.date}</td>
        <td>${e.weight ?? '-'}</td>
        <td>${e.intake?.toLocaleString() ?? '-'}</td>
        <td>${e.burn?.toLocaleString() ?? '-'}</td>
        <td class="${defClass}">${deficit?.toLocaleString() ?? '-'}</td>
        <td>${exercise}</td>
        <td>${e.memo || '-'}</td>
      </tr>`;
    });

    tbody.innerHTML = rows.join('');
  }

  function init() {
    const entries = loadData().sort((a, b) => a.date > b.date ? 1 : -1);
    renderCards(entries);
    renderProgress(entries);
    renderWeightChart(entries);
    renderDeficitChart(entries);
    renderTable(entries);
  }

  init();
</script>

</body>
</html>
